<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>焼定もとび佐倉 ラッキールーレット</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@700;900&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #fff;
      font-family: 'Noto Sans JP', 'Hiragino Kaku Gothic ProN', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 16px 32px;
      overflow-x: hidden;
      position: relative;
    }

    /* ── 水玉アニメ背景 ── */
    .dots-bg {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    .dot {
      position: absolute;
      border-radius: 50%;
      opacity: 0.13;
      animation: floatDot linear infinite;
    }

    @keyframes floatDot {
      0%   { transform: translateY(110vh) scale(0.8); opacity: 0; }
      10%  { opacity: 0.13; }
      90%  { opacity: 0.13; }
      100% { transform: translateY(-20vh) scale(1.1); opacity: 0; }
    }

    /* ── body直下のコンテンツはz-index:1以上に ── */
    .header, .chara-wrap, .wheel-section { position: relative; z-index: 1; }

    /* ── Header ── */
    .header {
      text-align: center;
      margin-bottom: 12px;
      width: 100%;
      padding-top: 0;
    }

    /* タイトル上の虹帯 */
    .rainbow-bar {
      width: 100%;
      height: 8px;
      background: linear-gradient(90deg,
        #FF6B9D, #FF9F43, #FFD93D, #6BCB77, #4D96FF, #c678dd, #FF6B9D
      );
      background-size: 200% 100%;
      animation: rainbowShift 3s linear infinite;
      margin-bottom: 16px;
    }

    @keyframes rainbowShift {
      0%   { background-position: 0% 0%; }
      100% { background-position: 200% 0%; }
    }

    .store-name {
      font-size: 0.78rem;
      font-weight: 700;
      color: #c0392b;
      letter-spacing: 0.12em;
      background: #fff;
      border: 2px solid #c0392b;
      border-radius: 20px;
      padding: 3px 14px;
      display: inline-block;
      margin-bottom: 8px;
    }

    h1 {
      font-size: 1.85rem;
      font-weight: 900;
      line-height: 1.2;
      letter-spacing: -0.01em;
      background: linear-gradient(135deg, #e84393 0%, #ff6b00 50%, #4D96FF 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(2px 2px 0 rgba(232,67,147,0.15));
    }

    .subtitle {
      font-size: 0.82rem;
      color: #aaa;
      margin-top: 4px;
      font-weight: 700;
    }

    /* ── Character ── */
    .chara-wrap {
      position: relative;
      display: flex;
      justify-content: center;
      margin: 4px 0 -10px;
      width: 100%;
      max-width: 340px;
    }

    .chara {
      width: 250px;
      height: auto;
      animation: charaBounce 1.8s ease-in-out infinite;
    }

    @keyframes charaBounce {
      0%,100% { transform: translateY(0) rotate(-3deg); }
      50%      { transform: translateY(-8px) rotate(3deg); }
    }

    .speech-bubble {
      position: absolute;
      top: 0px;
      right: 0px;
      background: #fff;
      border: 3px solid #e84393;
      border-radius: 16px;
      padding: 8px 14px;
      font-size: 0.9rem;
      font-weight: 900;
      color: #e84393;
      box-shadow: 2px 2px 0 #ffb3d9;
      white-space: nowrap;
    }

    .speech-bubble::before {
      content: '';
      position: absolute;
      bottom: -12px;
      left: 20px;
      border: 6px solid transparent;
      border-top-color: #e84393;
    }
    .speech-bubble::after {
      content: '';
      position: absolute;
      bottom: -7px;
      left: 21px;
      border: 5px solid transparent;
      border-top-color: #fff;
    }

    /* ── Wheel ── */
    .wheel-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      max-width: 360px;
    }

    .wheel-wrap {
      position: relative;
      width: min(290px, 86vw);
      height: min(290px, 86vw);
      margin: 0 auto;
    }

    #wheel {
      width: 100%;
      height: 100%;
    }

    .wheel-ring {
      position: absolute;
      inset: -10px;
      border-radius: 50%;
      background: conic-gradient(
        #ff6b9d, #ffd93d, #6bcb77, #4d96ff, #ff6b9d
      );
      animation: ringRotate 4s linear infinite;
      z-index: 0;
    }

    @keyframes ringRotate {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    .wheel-ring-inner {
      position: absolute;
      inset: -4px;
      border-radius: 50%;
      background: #fff;
      z-index: 1;
    }

    #wheel {
      display: block;
      position: relative;
      z-index: 2;
      border-radius: 50%;
    }

    .pointer {
      position: absolute;
      top: -6px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      filter: drop-shadow(0 3px 4px rgba(0,0,0,0.3));
    }

    .pointer svg {
      display: block;
    }

    /* ── Spin button ── */
    .spin-btn {
      display: block;
      margin: 20px auto 0;
      padding: 18px 56px;
      background: linear-gradient(135deg, #ff6b9d 0%, #ff9a3c 100%);
      color: #fff;
      font-size: 1.3rem;
      font-weight: 900;
      letter-spacing: 0.08em;
      border: none;
      border-radius: 60px;
      cursor: pointer;
      box-shadow:
        0 6px 0 #c0392b,
        0 8px 20px rgba(255,107,157,0.45);
      transition: transform 0.08s, box-shadow 0.08s;
      position: relative;
      text-shadow: 1px 1px 2px rgba(0,0,0,0.2);
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }

    /* ── Countdown ── */
    .countdown-wrap {
      height: 64px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      margin-top: 14px;
    }

    .countdown-num {
      font-size: 2.8rem;
      font-weight: 900;
      line-height: 1;
      color: #e84393;
      text-shadow: 3px 3px 0 rgba(232,67,147,0.2);
      transition: color 0.3s;
    }

    .countdown-num.urgent { color: #e84000; animation: pulse 0.4s ease-in-out infinite alternate; }

    @keyframes pulse {
      from { transform: scale(1); }
      to   { transform: scale(1.15); }
    }

    .countdown-label {
      font-size: 0.78rem;
      font-weight: 700;
      color: #aaa;
      margin-top: 2px;
    }

    /* ── Boost feedback ── */
    .boost-feedback {
      font-size: 1.1rem;
      font-weight: 900;
      color: #ff6b00;
      height: 28px;
      text-align: center;
      opacity: 0;
      transform: translateY(0);
      transition: none;
      pointer-events: none;
    }

    .boost-feedback.pop {
      animation: boostPop 0.5s ease-out forwards;
    }

    @keyframes boostPop {
      0%   { opacity: 1; transform: translateY(0)   scale(1.2); }
      100% { opacity: 0; transform: translateY(-20px) scale(0.9); }
    }

    .spin-btn::before {
      content: '🎯';
      margin-right: 8px;
    }

    .spin-btn:active:not(:disabled) {
      transform: translateY(4px);
      box-shadow:
        0 2px 0 #c0392b,
        0 4px 10px rgba(255,107,157,0.4);
    }

    .spin-btn:disabled {
      background: linear-gradient(135deg, #ccc, #aaa);
      color: #888;
      cursor: not-allowed;
      box-shadow: 0 4px 0 #999;
      text-shadow: none;
    }

    .spin-btn:disabled::before { content: '😢'; }

    .used-msg {
      margin-top: 14px;
      text-align: center;
      font-size: 0.85rem;
      color: #e84393;
      font-weight: 700;
    }

    /* ── Modal ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(30,0,50,0.65);
      z-index: 200;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .modal-overlay.active { display: flex; }

    .modal {
      background: linear-gradient(160deg, #fff9f0 0%, #fff0fb 100%);
      border: 4px solid #e84393;
      border-radius: 32px;
      padding: 28px 24px 24px;
      text-align: center;
      max-width: 320px;
      width: 100%;
      box-shadow: 0 24px 60px rgba(232,67,147,0.3);
      animation: popIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      position: relative;
      overflow: hidden;
    }

    .modal::before {
      content: '🌟✨🎉✨🌟';
      position: absolute;
      top: -4px;
      left: 0; right: 0;
      text-align: center;
      font-size: 1rem;
      opacity: 0.6;
    }

    @keyframes popIn {
      from { transform: scale(0.5) rotate(-5deg); opacity: 0; }
      to   { transform: scale(1) rotate(0deg);   opacity: 1; }
    }

    .modal-chara {
      width: 100px;
      height: auto;
      margin: 8px auto 0;
      display: block;
      animation: modalCharaBounce 0.6s ease-out;
    }

    @keyframes modalCharaBounce {
      0%   { transform: scale(0) rotate(-20deg); }
      70%  { transform: scale(1.15) rotate(5deg); }
      100% { transform: scale(1) rotate(0deg); }
    }

    .modal-congrats {
      font-size: 1.0rem;
      font-weight: 900;
      color: #e84393;
      margin: 10px 0 4px;
    }

    .modal-prize {
      font-size: 2rem;
      font-weight: 900;
      color: #ff6b00;
      line-height: 1.2;
      text-shadow: 2px 2px 0 rgba(255,107,0,0.15);
    }

    .modal-prize-sub {
      font-size: 1rem;
      font-weight: 700;
      color: #ff6b00;
      margin-bottom: 14px;
    }

    .modal-divider {
      border: none;
      border-top: 2px dashed #ffb3d9;
      margin: 0 0 12px;
    }

    .modal-note {
      font-size: 0.78rem;
      color: #999;
      line-height: 1.7;
      margin-bottom: 18px;
    }

    .modal-close {
      background: linear-gradient(135deg, #e84393, #ff9a3c);
      color: #fff;
      border: none;
      border-radius: 50px;
      padding: 14px 36px;
      font-size: 1rem;
      font-weight: 900;
      cursor: pointer;
      width: 100%;
      box-shadow: 0 4px 0 #c0392b;
      letter-spacing: 0.05em;
    }

    /* ── Confetti ── */
    .confetti-container {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 300;
      overflow: hidden;
    }

    .confetti-piece {
      position: absolute;
      top: -20px;
      width: 10px;
      height: 14px;
      border-radius: 2px;
      opacity: 0;
      animation: confettiFall linear forwards;
    }

    @keyframes confettiFall {
      0%   { transform: translateY(0) rotate(0deg); opacity: 1; }
      100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
    }
  </style>
</head>
<body>

  <div class="confetti-container" id="confetti"></div>

  <!-- 水玉背景 -->
  <div class="dots-bg" id="dotsBg"></div>

  <!-- Header -->
  <div class="header">
    <div class="rainbow-bar"></div>
    <div class="store-name">焼定 もとび佐倉</div>
    <h1>🎡 ラッキー<br>ルーレット</h1>
    <p class="subtitle">1日1回まわせるよ！なにが当たるかな？</p>
  </div>

  <!-- Character -->
  <div class="chara-wrap">
    <img src="kazukun.png" alt="カズくん" class="chara" id="chara">
    <div class="speech-bubble" id="bubble">まわしてね！</div>
  </div>

  <!-- Wheel -->
  <div class="wheel-section">
    <div class="wheel-wrap">
      <div class="wheel-ring"></div>
      <div class="wheel-ring-inner"></div>
      <canvas id="wheel" width="290" height="290"></canvas>
      <div class="pointer">
        <svg width="28" height="36" viewBox="0 0 28 36">
          <polygon points="14,36 0,0 28,0" fill="#e84393" stroke="#fff" stroke-width="2.5" stroke-linejoin="round"/>
          <circle cx="14" cy="5" r="4" fill="#fff" stroke="#e84393" stroke-width="2"/>
        </svg>
      </div>
    </div>

    <div class="countdown-wrap" id="countdownWrap">
      <div class="countdown-num" id="countdownNum"></div>
      <div class="countdown-label" id="countdownLabel"></div>
    </div>

    <div class="boost-feedback" id="boostFeedback">🚀 ブースト！</div>

    <button id="spinBtn" class="spin-btn">まわす！</button>
    <p class="used-msg" id="usedMsg"></p>
  </div>

  <!-- Result modal -->
  <div class="modal-overlay" id="modal">
    <div class="modal">
      <img src="kazukun.png" alt="カズくん" class="modal-chara">
      <p class="modal-congrats">🎉 やったー！当たり！ 🎉</p>
      <p class="modal-prize" id="prizeMain"></p>
      <p class="modal-prize-sub" id="prizeSub"></p>
      <hr class="modal-divider">
      <p class="modal-note">
        スタッフさんにこの画面を見せてね！<br>
        今日のご来店中のみ有効だよ 🍖
      </p>
      <button class="modal-close" id="modalClose">やったね！閉じる</button>
    </div>
  </div>

<script>
  // ── Prize definitions（均等割）────────────────────────────
  const PRIZES = [
    { label: 'ドリンク\n1杯無料',     display: 'ドリンク',   sub: '1杯無料！',   color: '#FF6B9D', textColor: '#fff' },
    { label: 'ハラミ\n1切れ無料',     display: 'ハラミ',     sub: '1切れ無料！', color: '#FFD93D', textColor: '#333' },
    { label: '和牛カルビ\n1切れ無料', display: '和牛カルビ', sub: '1切れ無料！', color: '#FF6B35', textColor: '#fff' },
    { label: '豚タン\n1切れ無料',     display: '豚タン',     sub: '1切れ無料！', color: '#6BCB77', textColor: '#fff' },
    { label: '鶏もも\n1切れ無料',     display: '鶏もも',     sub: '1切れ無料！', color: '#4D96FF', textColor: '#fff' },
  ];

  const N   = PRIZES.length;
  const ARC = (2 * Math.PI) / N;

  const IS_DEV = false;

  const STORAGE_KEY = 'motobisakura_roulette_v1';

  function todayStr() {
    const d = new Date();
    return `${d.getFullYear()}-${d.getMonth() + 1}-${d.getDate()}`;
  }

  function hasPlayedToday() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return false;
      return JSON.parse(raw).date === todayStr();
    } catch { return false; }
  }

  function markPlayed() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({ date: todayStr() }));
  }

  // ── Canvas / Wheel ─────────────────────────────────────────
  const canvas = document.getElementById('wheel');
  const ctx    = canvas.getContext('2d');
  const CX = canvas.width / 2;
  const CY = canvas.height / 2;
  const R  = CX - 6;

  let currentAngle = 0;
  let isSpinning   = false;

  function drawWheel(angle) {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    for (let i = 0; i < N; i++) {
      const start = angle + i * ARC;
      const end   = start + ARC;
      const mid   = start + ARC / 2;
      const p     = PRIZES[i];

      // Segment
      ctx.beginPath();
      ctx.moveTo(CX, CY);
      ctx.arc(CX, CY, R, start, end);
      ctx.closePath();
      ctx.fillStyle = p.color;
      ctx.fill();

      // Subtle inner border
      ctx.strokeStyle = 'rgba(255,255,255,0.6)';
      ctx.lineWidth = 2.5;
      ctx.stroke();

      // Text
      ctx.save();
      ctx.translate(CX, CY);
      ctx.rotate(mid);
      ctx.textAlign = 'right';
      ctx.fillStyle = p.textColor;

      const lines = p.label.split('\n');
      const lineH = 14;
      const textR = R - 8;

      ctx.font = 'bold 11px "Noto Sans JP", "Hiragino Kaku Gothic ProN", sans-serif';
      lines.forEach((line, idx) => {
        const oy = (idx - (lines.length - 1) / 2) * lineH;
        // Shadow
        ctx.fillStyle = 'rgba(0,0,0,0.25)';
        ctx.fillText(line, textR + 1, oy + 5);
        ctx.fillStyle = p.textColor;
        ctx.fillText(line, textR, oy + 4);
      });

      ctx.restore();
    }

    // Outer ring
    ctx.beginPath();
    ctx.arc(CX, CY, R, 0, 2 * Math.PI);
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 5;
    ctx.stroke();

    // Center cap
    const grad = ctx.createRadialGradient(CX - 4, CY - 4, 2, CX, CY, 22);
    grad.addColorStop(0, '#fff');
    grad.addColorStop(1, '#ffe0f0');
    ctx.beginPath();
    ctx.arc(CX, CY, 22, 0, 2 * Math.PI);
    ctx.fillStyle = grad;
    ctx.fill();
    ctx.strokeStyle = '#e84393';
    ctx.lineWidth = 3;
    ctx.stroke();

    ctx.font = '16px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('🔥', CX, CY);
    ctx.textBaseline = 'alphabetic';
  }

  // ── Determine prize ─────────────────────────────────────────
  function getPrizeIndex(totalAngle) {
    let pos = ((-Math.PI / 2) - totalAngle) % (2 * Math.PI);
    if (pos < 0) pos += 2 * Math.PI;
    return Math.floor(pos / ARC) % N;
  }

  // ── Confetti ────────────────────────────────────────────────
  const CONFETTI_COLORS = ['#FF6B9D','#FFD93D','#6BCB77','#4D96FF','#FF6B35','#e84393','#fff'];

  function launchConfetti() {
    const container = document.getElementById('confetti');
    container.innerHTML = '';
    for (let i = 0; i < 60; i++) {
      const el = document.createElement('div');
      el.className = 'confetti-piece';
      el.style.left = Math.random() * 100 + 'vw';
      el.style.background = CONFETTI_COLORS[Math.floor(Math.random() * CONFETTI_COLORS.length)];
      el.style.width  = (8 + Math.random() * 8) + 'px';
      el.style.height = (12 + Math.random() * 10) + 'px';
      el.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
      el.style.animationDuration = (1.5 + Math.random() * 2) + 's';
      el.style.animationDelay   = (Math.random() * 0.8) + 's';
      container.appendChild(el);
    }
    setTimeout(() => { container.innerHTML = ''; }, 4000);
  }

  // ── Character speech ────────────────────────────────────────
  const BUBBLES_IDLE = ['まわしてね！', 'がんばれ～！', 'ドキドキ…♪'];
  const BUBBLES_SPIN = ['いけ～！', 'ドキドキ…！', 'まわれ～！', 'どこかな…？'];
  const BUBBLES_WIN  = ['やったー！🎉', 'すごい！！', 'ラッキー✨'];

  let bubbleTimer = null;

  function setBubble(text) {
    document.getElementById('bubble').textContent = text;
  }

  function startIdleBubbles() {
    let idx = 0;
    bubbleTimer = setInterval(() => {
      setBubble(BUBBLES_IDLE[idx % BUBBLES_IDLE.length]);
      idx++;
    }, 2500);
  }

  function stopIdleBubbles() { clearInterval(bubbleTimer); }

  // ── Spin state ──────────────────────────────────────────────
  // phase: 'idle' → 'active'（5秒間タップ受付）→ 'stopping' → 'idle'
  const ACTIVE_MS   = 5000;   // タップ受付時間
  const BASE_VEL    = 0.15;   // 初速 (rad/frame @60fps) ≈ 1.4回転/秒
  const BOOST_VEL   = 0.055;  // タップ1回の加速量
  const MAX_VEL     = 0.34;   // 上限速度 ≈ 3.2回転/秒
  const DECEL       = 0.987;  // 停止フェーズの減速率/frame（ゆっくり止まる）
  const STOP_VEL    = 0.0008; // これ以下になったら完全停止

  let phase       = 'idle';
  let velocity    = 0;
  let spinEndTime = 0;
  let lastTime    = 0;
  let animId      = null;

  const spinBtn        = document.getElementById('spinBtn');
  const countdownWrap  = document.getElementById('countdownWrap');
  const countdownNum   = document.getElementById('countdownNum');
  const countdownLabel = document.getElementById('countdownLabel');
  const boostFeedback  = document.getElementById('boostFeedback');

  function showBoostFeedback() {
    boostFeedback.classList.remove('pop');
    void boostFeedback.offsetWidth; // reflow
    boostFeedback.classList.add('pop');
  }

  function updateCountdown(remaining) {
    const sec = Math.ceil(remaining / 1000);
    countdownNum.textContent = sec;
    countdownNum.className = 'countdown-num' + (sec <= 2 ? ' urgent' : '');
    countdownLabel.textContent = 'びょう！タップしてブースト！';
  }

  function clearCountdown() {
    countdownNum.textContent = '';
    countdownLabel.textContent = '';
  }

  function animLoop(now) {
    const dt = lastTime ? Math.min(now - lastTime, 50) : 16.67;
    lastTime = now;
    const frames = dt / 16.67;

    if (phase === 'active') {
      currentAngle += velocity * frames;
      drawWheel(currentAngle);

      const remaining = spinEndTime - now;
      if (remaining > 0) {
        updateCountdown(remaining);
        animId = requestAnimationFrame(animLoop);
      } else {
        // 5秒終了 → 停止フェーズへ
        clearCountdown();
        countdownLabel.textContent = '止まれ～！';
        spinBtn.textContent = '止まれ～！';
        phase = 'stopping';
        setBubble('どこかな…？');
        animId = requestAnimationFrame(animLoop);
      }
    } else if (phase === 'stopping') {
      velocity *= Math.pow(DECEL, frames);
      currentAngle += velocity * frames;
      drawWheel(currentAngle);

      if (velocity < STOP_VEL) {
        phase = 'idle';
        countdownLabel.textContent = '';
        drawWheel(currentAngle);
        markPlayed();
        const prize = PRIZES[getPrizeIndex(currentAngle)];
        setBubble(BUBBLES_WIN[Math.floor(Math.random() * BUBBLES_WIN.length)]);
        launchConfetti();
        setTimeout(() => showResult(prize), 600);
      } else {
        animId = requestAnimationFrame(animLoop);
      }
    }
  }

  function handleTap() {
    if (hasPlayedToday()) return;

    if (phase === 'idle') {
      // 1回目タップ：スタート
      phase = 'active';
      velocity = BASE_VEL + Math.random() * 0.005;
      spinEndTime = performance.now() + ACTIVE_MS;
      lastTime = 0;
      stopIdleBubbles();
      spinBtn.textContent = 'タップ！';
      spinBtn.style.background = 'linear-gradient(135deg, #6BCB77 0%, #4D96FF 100%)';
      setBubble(BUBBLES_SPIN[0]);
      animId = requestAnimationFrame(animLoop);

    } else if (phase === 'active') {
      // 2回目以降：ブースト
      velocity = Math.min(velocity + BOOST_VEL, MAX_VEL);
      showBoostFeedback();
      const spinBubbles = BUBBLES_SPIN;
      setBubble(spinBubbles[Math.floor(Math.random() * spinBubbles.length)]);
    }
    // stopping フェーズ中はタップ無効
  }

  // ── Modal ───────────────────────────────────────────────────
  function showResult(prize) {
    document.getElementById('prizeMain').textContent = prize.display;
    document.getElementById('prizeSub').textContent  = prize.sub;
    document.getElementById('modal').classList.add('active');
  }

  document.getElementById('modalClose').addEventListener('click', () => {
    document.getElementById('modal').classList.remove('active');
    if (!IS_DEV) {
      spinBtn.disabled = true;
      spinBtn.textContent = '今日はもうおわり…';
      document.getElementById('usedMsg').textContent = 'また明日あそびにきてね！🐄';
    } else {
      // DEVモードはリセット
      spinBtn.style.background = '';
      spinBtn.textContent = 'まわす！';
      startIdleBubbles();
    }
  });

  // ── Init ────────────────────────────────────────────────────
  spinBtn.addEventListener('click', handleTap);

  if (IS_DEV) {
    document.getElementById('usedMsg').textContent = '🛠 DEVモード: 何度でも回せます';
    document.getElementById('usedMsg').style.color = '#aaa';
    document.getElementById('usedMsg').style.fontSize = '0.7rem';
  }

  if (hasPlayedToday()) {
    spinBtn.disabled = true;
    spinBtn.textContent = '今日はもうおわり…';
    document.getElementById('usedMsg').textContent = 'また明日あそびにきてね！🐄';
    setBubble('また明日ね～！');
  } else {
    startIdleBubbles();
  }

  drawWheel(0);

  // ── 水玉背景を生成 ────────────────────────────────────────
  const DOT_COLORS = ['#FF6B9D','#FFD93D','#6BCB77','#4D96FF','#FF9F43','#c678dd','#FF6B35'];
  const dotsBg = document.getElementById('dotsBg');
  for (let i = 0; i < 22; i++) {
    const el = document.createElement('div');
    el.className = 'dot';
    const size = 20 + Math.random() * 60;
    el.style.cssText = `
      width: ${size}px;
      height: ${size}px;
      left: ${Math.random() * 100}%;
      background: ${DOT_COLORS[i % DOT_COLORS.length]};
      animation-duration: ${6 + Math.random() * 10}s;
      animation-delay: ${-Math.random() * 12}s;
    `;
    dotsBg.appendChild(el);
  }
</script>
</body>
</html>
